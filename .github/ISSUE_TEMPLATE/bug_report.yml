name: Bug report
description: Something isn't working as expected
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I tap Tonight on the first card, the app..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps that reliably trigger the bug.
      placeholder: |
        1. Open the app
        2. Enter a title and tap Start
        3. Tap Tonight on the first card
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: The next card should appear.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      placeholder: The app shows a blank screen.
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: "Chrome 125, Safari 17, Firefox 126..."
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15, iOS 17, Android 14, Windows 11..."
    validations:
      required: false

  - type: dropdown
    id: mode
    attributes:
      label: Running mode
      options:
        - Mock mode (VITE_USE_MOCK=true)
        - Live API (VITE_USE_MOCK=false)
        - Not sure
    validations:
      required: true

  - type: textarea
    id: extras
    attributes:
      label: Screenshots or recordings
      description: Drag and drop images here if helpful.
    validations:
      required: false
